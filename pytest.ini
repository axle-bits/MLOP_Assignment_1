[pytest]
filterwarnings =
    # joblib 1.5.3's numpy_pickle.py assigns array.shape directly, which
    # numpy 2.5 deprecated. Third-party internals, triggered on every
    # joblib.load of the model artifact; scoped ignore until a joblib
    # release adapts. Everything else still surfaces.
    ignore:Setting the shape on a NumPy array has been deprecated:DeprecationWarning:joblib.numpy_pickle
