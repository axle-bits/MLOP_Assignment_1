apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: heart-disease
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: heart-disease-api
        metrics_path: /metrics
        dns_sd_configs:
          - names:
              - heart-disease-api-headless.heart-disease.svc.cluster.local
            type: A
            port: 8000
