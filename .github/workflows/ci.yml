name: CI

on:
  push:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        # keep this pin in lockstep with requirements.txt
        run: pip install "ruff==0.15.20"
      - name: Lint (ruff)
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest -v --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  train-smoke:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train all six model combinations (quick grids)
        shell: bash
        run: python -m ml.models.train --quick --tracking-uri sqlite:///ci-mlflow.db 2>&1 | tee train-output.log
      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-run
          path: |
            train-output.log
            ci-mlflow.db
            mlruns/

  docker:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t heart-disease-api -f infra/Dockerfile .
      - name: Run container
        run: docker run -d --name api -p 8000:8000 heart-disease-api
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          echo "service never became healthy"; docker logs api; exit 1
      - name: Smoke test /predict
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d @api/sample_request.json)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"prediction"'
      - name: Container logs (request logging evidence)
        if: always()
        run: docker logs api
      - name: Stop container
        if: always()
        run: docker rm -f api
